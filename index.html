<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Araçatuba Distribuidora — Alimentos e bebidas em Manaus/AM</title>
  <meta name="theme-color" content="#1c3a2b">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">

  <!-- SEO -->
  <meta name="description" content="Distribuidora Araçatuba de Alimentos — atacado e logística de alimentos e bebidas em Manaus e região metropolitana. Atendimento próximo, entrega no prazo e portfólio completo para o seu comércio.">

  <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Araçatuba Distribuidora">
  <meta property="og:title" content="Gente que abastece o seu negócio, todos os dias.">
  <meta property="og:description" content="Distribuidora de alimentos e bebidas em Manaus/AM. Atendimento próximo, entrega no prazo e portfólio completo para a sua prateleira nunca ficar vazia.">
  <meta property="og:url" content="https://aracatubadistribuidora.com/">
  <meta property="og:image" content="https://aracatubadistribuidora.com/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="pt_BR">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Araçatuba Distribuidora">
  <meta name="twitter:description" content="Distribuição de alimentos e bebidas em Manaus e região.">
  <meta name="twitter:image" content="https://aracatubadistribuidora.com/og-image.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Forms ocultos p/ detecção do Netlify Forms no build (SPA: os forms reais são renderizados via React) -->
  <form name="ouvidoria" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="text" name="nome" />
    <input type="text" name="contato" />
    <select name="assunto"><option>Elogio</option><option>Sugestão</option><option>Reclamação</option><option>Dúvida</option></select>
    <textarea name="mensagem"></textarea>
    <input name="bot-field" />
  </form>
  <form name="trabalhe-conosco" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
    <input type="text" name="nome" />
    <input type="text" name="telefone" />
    <select name="area"><option>Vendas</option><option>Logística / Entrega</option><option>Operação / Depósito</option><option>Administrativo</option></select>
    <input type="file" name="curriculo" />
    <input name="bot-field" />
  </form>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
